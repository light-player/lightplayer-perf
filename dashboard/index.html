<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LightPlayer Performance</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">LightPlayer</p>
        <h1>Performance History</h1>
        <p class="lede">Main stays center stage. Feature branches get enough oxygen to catch regressions where the real work happens.</p>
      </header>

      <section class="panel controls">
        <label>
          Workload
          <select id="workload"></select>
        </label>
        <label>
          Branch
          <select id="branch"></select>
        </label>
      </section>

      <section class="grid">
        <article class="panel chart-card">
          <h2>Main Trend</h2>
          <canvas id="main-chart" width="960" height="320"></canvas>
        </article>
        <article class="panel">
          <h2>Recent Feature Branches</h2>
          <div id="feature-list" class="feature-list"></div>
        </article>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Latest Run</h2>
          <dl id="latest-run" class="facts"></dl>
        </article>
        <article class="panel">
          <h2>Top Self Cycles</h2>
          <table>
            <thead>
              <tr>
                <th>Function</th>
                <th>Cycles</th>
                <th>%</th>
              </tr>
            </thead>
            <tbody id="top-self"></tbody>
          </table>
        </article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
