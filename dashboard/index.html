<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LightPlayer Performance</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">LightPlayer / perf</p>
        <h1>Telemetry</h1>
      </header>

      <section class="panel controls">
        <label>
          Series
          <select id="series"></select>
        </label>
        <label>
          Metric
          <select id="metric"></select>
        </label>
        <label>
          Branch
          <select id="branch"></select>
        </label>
      </section>

      <section class="grid meta-grid">
        <article class="panel">
          <h2>Tracking</h2>
          <dl id="tracking" class="facts"></dl>
        </article>
        <article class="panel">
          <h2>Metric Meaning</h2>
          <dl id="metric-detail" class="facts"></dl>
        </article>
      </section>

      <section class="grid">
        <article class="panel chart-card">
          <h2 id="chart-title">Main Branch Trend</h2>
          <canvas id="main-chart" width="960" height="320"></canvas>
        </article>
        <article class="panel">
          <h2>Recent Feature Branches</h2>
          <div id="feature-list" class="feature-list"></div>
        </article>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Latest Run</h2>
          <dl id="latest-run" class="facts"></dl>
        </article>
        <article class="panel">
          <h2 id="detail-title">Top Self Cycles</h2>
          <table>
            <thead>
              <tr>
                <th id="detail-col-1">Function</th>
                <th id="detail-col-2">Cycles</th>
                <th id="detail-col-3">%</th>
              </tr>
            </thead>
            <tbody id="detail-body"></tbody>
          </table>
        </article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
